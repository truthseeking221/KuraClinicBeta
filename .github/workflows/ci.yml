name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure private package registry
        env:
          HUGEICONS_TOKEN: ${{ secrets.HUGEICONS_TOKEN }}
        run: |
          npm config set @hugeicons-pro:registry https://npm.hugeicons.com/
          npm config set //npm.hugeicons.com/:_authToken "$HUGEICONS_TOKEN"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check ReUI ownership
        run: npm run check:reui-ownership

      - name: Build
        run: npm run build
